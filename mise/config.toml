# Global mise settings (symlinked to ~/.config/mise/config.toml)
# Docs: https://mise.jdx.dev/configuration/settings.html

[settings]
# Automatically install missing tools for `mise run` / `mise exec` workflows.
auto_install = true

# Cache resolved environment for faster prompt/hooks in large repos.
env_cache = true
env_cache_ttl = "2h"

# Match terminal theme family used across this dotfiles repo.
color_theme = "catppuccin"

[tools]
node = "25.8.2"
go = "latest"
gemini = "latest"
"npm:gitmoji-cli" = "latest"
"npm:@mariozechner/pi-coding-agent" = "latest"
"npm:clawpatch" = "latest"
"go:golang.org/x/tools/gopls" = "latest"
rust = "latest"
uv = "latest"
"go:github.com/perplexityai/bumblebee/cmd/bumblebee" = "0.1.1"
"pipx:NVIDIA/SkillSpector" = "9686f65c2ee2efdbaf19f8c27bfd1be9366c5277"

# Project-specific mise config for this dotfiles repository
# Docs: https://mise.jdx.dev/configuration.html

min_version = { soft = "2025.1.0" }

[tools]
# Shell tooling used for dotfiles maintenance
python = "3.13.11"
shellcheck = "latest"
shfmt = "latest"
gitleaks = "latest"

[tasks.mise-install]
description = "Install tools from mise.toml"
run = "mise install"

[tasks.lint-shell]
description = "Lint shell scripts in this repo"
run = [
  "shellcheck bootstrap.sh macos/.macos theme/install.sh zsh/.zshrc zsh/*.zsh scripts/*.sh",
]

[tasks.fmt-shell]
description = "Format shell scripts in this repo"
run = [
  "shfmt -w bootstrap.sh macos/.macos theme/install.sh zsh/.zshrc zsh/*.zsh scripts/*.sh",
]

[tasks.fmt-check]
description = "Check shell formatting without writing"
run = [
  "shfmt -d bootstrap.sh macos/.macos theme/install.sh zsh/.zshrc zsh/*.zsh scripts/*.sh",
]

[tasks.check]
description = "Run core validation for this repo"
run = [
  "mise run lint-shell",
  "mise run fmt-check",
  "mise run docs-check",
  "bash -n bootstrap.sh",
  "bash -n macos/.macos",
  "bash -n theme/install.sh",
  "bash -n scripts/doctor-ai.sh",
  "bash -n scripts/bootstrap-verify.sh",
]

[tasks.bootstrap-verify]
description = "Verify expected post-bootstrap config links/files"
run = "./scripts/bootstrap-verify.sh"

[tasks.ai-doctor]
description = "Check AI toolchain binaries/config/env"
run = "./scripts/doctor-ai.sh"

[tasks.docs-build]
description = "Regenerate the docs site data from repo sources"
run = "python3 ./scripts/generate-docs.py"

[tasks.docs-check]
description = "Ensure generated docs data is up to date"
run = [
  "python3 ./scripts/check-docs.py",
]

[tasks.docs-serve]
description = "Serve the docs site locally with mise-managed Python"
run = "python3 -m http.server 4173 --directory docs"

[tasks.verify]
description = "Run AI doctor + bootstrap verification"
run = ["mise run ai-doctor", "mise run bootstrap-verify"]

[tasks.precommit-install]
description = "Install git pre-commit hooks"
run = "pre-commit install"

[tasks.precommit-run]
description = "Run pre-commit hooks across all files"
run = "pre-commit run --all-files"

[tasks.secrets-scan]
description = "Run gitleaks against repository"
run = "gitleaks detect --source . --verbose"

[tasks.doctor]
description = "Run mise diagnostics"
run = "mise doctor"
